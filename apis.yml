apis:
  - aid: ntt-com:ntt-communications-developer-portal
    name: NTT DOCOMO BUSINESS Developer Portal
    description: >-
      Unified API gateway for NTT Communications / NTT DOCOMO BUSINESS
      enterprise services. Catalogs APIs across Network, Cloud, Voice,
      App, Management, and Core categories — including Arcstar Universal
      One (traffic, contract, circuit alarm, Flexible-Ethernet, Mobile,
      Global M2M), Smart Data Platform Network and Cloud, Safety
      Confirmation, Simultaneous Notification, Service Order, Billing,
      Pay-per-use, Price, Organization, Personal Profile, Authorization,
      API Log (v1/v2), and Business Process APIs. The portal documents
      OpenAPI-described interfaces with request/response schemas and
      Python and Ruby sample code.
    humanURL: https://developer.ntt.com/en
    baseURL: https://api.ntt.com/
    tags:
      - Network
      - Cloud
      - Voice
      - IoT
      - Enterprise
    properties:
      - type: Portal
        url: https://developer.ntt.com/en
      - type: Documentation
        url: https://developer.ntt.com/en/api-docs
      - type: Blog
        url: https://developer.ntt.com/en/blog
  - aid: ntt-com:smart-data-platform-cloud
    name: Smart Data Platform — Enterprise Cloud 2.0
    description: >-
      NTT Communications' Enterprise Cloud 2.0 control APIs for
      provisioning compute, storage, networking, and managed services.
      Programmatic access is provided via the eclsdk Python SDK, eclcloud
      Go SDK, the eclcli command-line tool, and the terraform-provider-ecl
      Terraform provider.
    humanURL: https://sdpf.ntt.com/services/baremetal-server/
    tags:
      - Cloud
      - Infrastructure
      - Enterprise Cloud
    properties:
      - type: Documentation
        url: https://sdpf.ntt.com/
      - type: SDK
        url: https://github.com/nttcom/eclsdk
        name: Enterprise Cloud Python SDK
      - type: SDK
        url: https://github.com/nttcom/eclcloud
        name: Enterprise Cloud Go SDK
      - type: CLI
        url: https://github.com/nttcom/eclcli
        name: Enterprise Cloud CLI
      - type: Terraform
        url: https://github.com/nttcom/terraform-provider-ecl
        name: terraform-provider-ecl
  - aid: ntt-com:smart-data-platform-network
    name: Smart Data Platform — Flexible InterConnect
    description: >-
      Network control APIs for NTT Communications' Flexible InterConnect
      service, enabling programmatic management of inter-cloud and
      inter-DC connectivity. Exposed through the terraform-provider-fic
      Terraform provider and the developer.ntt.com portal.
    humanURL: https://sdpf.ntt.com/services/fic/
    tags:
      - Network
      - SD-WAN
      - InterConnect
    properties:
      - type: Documentation
        url: https://sdpf.ntt.com/services/fic/
      - type: Terraform
        url: https://github.com/nttcom/terraform-provider-fic
        name: terraform-provider-fic
  - aid: ntt-com:things-cloud
    name: NTT Communications Things Cloud
    description: >-
      IoT device-management platform exposing a documented OpenAPI
      specification for device, measurement, alarm, event, and tenant
      management. Targets industrial and enterprise IoT deployments.
    humanURL: https://developer.ntt.com/iot/docs/reference/openapi/
    tags:
      - IoT
      - Device Management
      - Things Cloud
    properties:
      - type: OpenAPI
        url: https://developer.ntt.com/iot/docs/reference/openapi/
      - type: Documentation
        url: https://developer.ntt.com/iot/
  - aid: ntt-com:arcstar-universal-one
    name: Arcstar Universal One APIs
    description: >-
      Family of APIs for NTT Communications' Arcstar Universal One
      managed VPN/network service — including traffic and contract info,
      circuit alarm retrieval, Flexible-Ethernet bandwidth and route
      control, mobile line operation status (data usage), and Global M2M
      SIM card control.
    humanURL: https://developer.ntt.com/en/api-docs
    tags:
      - Network
      - VPN
      - M2M
      - Mobile
    properties:
      - type: Documentation
        url: https://developer.ntt.com/en/api-docs
  - aid: ntt-com:docomo-developer-support
    name: docomo Developer Support
    description: >-
      NTT DOCOMO's developer portal for smartphone-application APIs,
      launched November 2013. Provides API keys, console, and developer
      account management for DOCOMO services targeted at mobile-app
      builders.
    humanURL: https://dev.smt.docomo.ne.jp/
    tags:
      - Mobile
      - Smartphone
      - DOCOMO
    properties:
      - type: Portal
        url: https://dev.smt.docomo.ne.jp/
      - type: Documentation
        url: https://dev.smt.docomo.ne.jp/?p=about.api
