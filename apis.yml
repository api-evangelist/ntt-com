aid: ntt-com
name: NTT
description: >-
  NTT (Nippon Telegraph and Telephone Corporation) is a Tokyo-headquartered
  global technology and telecommunications group with roughly 340,000
  employees and a 150-year history of innovation. The group operates through
  five business divisions — Consulting & IT Services, Mobile Solutions,
  Smart Tech, Consumer & Business, and Research & Development — and is
  anchored by major subsidiaries including NTT DOCOMO (Japan's largest
  mobile carrier), NTT Communications / NTT DOCOMO BUSINESS (enterprise
  cloud, network, and platform services), NTT DATA Group (global IT
  services and systems integration), NTT Ltd. (managed services), and NTT
  Research. NTT exposes a substantial developer surface through the NTT
  DOCOMO BUSINESS Developer Portal at developer.ntt.com, which catalogs
  enterprise APIs across Network (Arcstar Universal One, Flexible
  InterConnect, Global M2M), Cloud (Smart Data Platform, Enterprise Cloud
  2.0), Voice, App (Safety Confirmation, Text & Language Analysis, Speech
  Recognition), Management (asset visibility, vulnerability), and Core
  (Authorization, Billing, API Log, Business Process, Service Order,
  Pay-per-use, Price, Organization, Personal Profile) categories. The
  group also publishes IoT APIs (Things Cloud) and a docomo Developer
  support portal at dev.smt.docomo.ne.jp. NTT's primary open source
  presence is the nttcom GitHub organization, which ships the Enterprise
  Cloud Python and Go SDKs (eclsdk / eclcloud), the eclcli command-line
  tool, Terraform providers for Enterprise Cloud 2.0 (terraform-provider-
  ecl) and Flexible InterConnect (terraform-provider-fic), the ksot
  network-IaC framework, the pola stateful PCE / PCEP library, the fluvia
  eBPF/XDP IPFIX exporter, and threatconnectome for SBOM-driven
  vulnerability management. NTT DATA additionally maintains regional
  GitHub orgs (NTTDATA, NTTDATA-EMEA, NTTDATA-DACH, NTTDATAInnovation,
  launchbynttdata, nttdata-oss) covering testing automation, Kubernetes
  plugins, and LLM observability tooling. NTT also drives the IOWN
  (Innovative Optical and Wireless Network) initiative, photonics and
  optical-quantum research, and responsible AI development across its R&D
  arm.
